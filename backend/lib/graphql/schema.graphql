# Data
type MusicMetadata {
  id: ID!
  title: String!
  seconds: Int!
  size: Int!
  manifestPath: String!
  artworkImagePath: String!
  artworkThumbnailImagePath: String!
}

type GenerateS3PresignedUrlOutput {
  url: String!
}

type DeleteS3FolderOutput {
  deletedCount: Int!
}

# Input
input CreateMusicMetadataInput {
  id: ID!
  title: String!
  seconds: Int!
  size: Int!
  manifestPath: String!
  artworkImagePath: String!
  artworkThumbnailImagePath: String!
}

input UpdateMusicMetadataInput {
  id: ID!
  title: String
  seconds: Int
  size: Int
  manifestPath: String
  artworkImagePath: String
  artworkThumbnailImagePath: String
}

input DeleteMusicMetadataInput {
  id: ID!
}

input GenerateS3PresignedUrlInput {
  key: String!
}

input DeleteS3FolderInput {
  prefix: String!
}

input ProcessMusicInput {
  key: String!
}

type ProcessMusicOutput {
  manifestPath: String!
}

# Query
type Query {
  listMusicMetadata: [MusicMetadata!]!
  generateS3PresignedUrl(input: GenerateS3PresignedUrlInput!): GenerateS3PresignedUrlOutput
}

# Mutation
type Mutation {
  createMusicMetadata(input: CreateMusicMetadataInput!): MusicMetadata
  updateMusicMetadata(input: UpdateMusicMetadataInput!): MusicMetadata
  removeMusicMetadata(input: DeleteMusicMetadataInput!): MusicMetadata
  deleteS3Folder(input: DeleteS3FolderInput!): DeleteS3FolderOutput
  processMusic(input: ProcessMusicInput!): ProcessMusicOutput
}

# Subscription
type Subscription {
  onCreateMusicMetadata: MusicMetadata
    @aws_subscribe(mutations: ["createMusicMetadata"])
  onUpdateMusicMetadata: MusicMetadata
    @aws_subscribe(mutations: ["updateMusicMetadata"])
  onRemoveMusicMetadata: MusicMetadata
    @aws_subscribe(mutations: ["removeMusicMetadata"])
}
